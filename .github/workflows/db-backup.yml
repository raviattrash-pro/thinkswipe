name: High-Performance TiDB Sync & Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: db-backup-sync
  cancel-in-progress: false

jobs:
  backup-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Install MySQL client and zip tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client zip

      - name: Dump SQL from Primary TiDB
        env:
          S_HOST: ${{ secrets.PRIMARY_DB_HOST }}
          S_PORT: 4000
          S_USER: ${{ secrets.PRIMARY_DB_USER }}
          S_PASS: ${{ secrets.PRIMARY_DB_PASSWORD }}
          S_DB: ${{ secrets.PRIMARY_DB_NAME }}
        run: |
          mysqldump \
            -h "$S_HOST" \
            -P "$S_PORT" \
            -u "$S_USER" \
            -p"$S_PASS" \
            --single-transaction \
            --quick \
            --column-statistics=0 \
            --set-gtid-purged=OFF \
            --no-tablespaces \
            --skip-lock-tables \
            --skip-add-locks \
            "$S_DB" > backup.sql
          test -s backup.sql
          gzip -f backup.sql
          echo "SQL dump from Primary complete."

      - name: Export CSV files from Primary TiDB
        env:
          S_HOST: ${{ secrets.PRIMARY_DB_HOST }}
          S_PORT: 4000
          S_USER: ${{ secrets.PRIMARY_DB_USER }}
          S_PASS: ${{ secrets.PRIMARY_DB_PASSWORD }}
          S_DB: ${{ secrets.PRIMARY_DB_NAME }}
        run: |
          mkdir -p csv
          mysql -h "$S_HOST" -P "$S_PORT" -u "$S_USER" -p"$S_PASS" -Nse \
            "SELECT table_name FROM information_schema.tables WHERE table_schema='$S_DB' ORDER BY table_name;" \
            > tables.txt
          while read -r table; do
            [ -n "$table" ] || continue
            echo "Exporting $table to CSV..."
            mysql -h "$S_HOST" -P "$S_PORT" -u "$S_USER" -p"$S_PASS" \
              --batch --raw --silent \
              -e "SELECT * FROM \`$S_DB\`.\`$table\`" \
              | awk 'BEGIN { OFS="," } { gsub(/"/, "\"\"", $0); print }' \
              | sed 's/\t/,/g' > "csv/${table}.csv"
          done < tables.txt
          zip -r backup-csv.zip csv
          echo "CSV export complete."

      - name: Upload SQL backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: primary-sql-backup-${{ github.run_id }}
          path: backup.sql.gz
          retention-days: 5

      - name: Upload CSV backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: primary-csv-backup-${{ github.run_id }}
          path: backup-csv.zip
          retention-days: 5

      - name: Sync SQL backup to Secondary TiDB
        env:
          T_HOST: ${{ secrets.SECONDARY_DB_HOST }}
          T_PORT: 4000
          T_USER: ${{ secrets.SECONDARY_DB_USER }}
          T_PASS: ${{ secrets.SECONDARY_DB_PASSWORD }}
          T_DB: ${{ secrets.SECONDARY_DB_NAME }}
        if: env.T_HOST != ''
        run: |
          echo "Syncing data to Secondary TiDB using Low-Permission Protocol..."
          # Fix: Unzip, substitute INSERT with REPLACE (for forbidden CREATE/DROP), and pipe to mysql
          gunzip -c backup.sql.gz | sed 's/^INSERT INTO/REPLACE INTO/' | mysql \
            -h "$T_HOST" \
            -P "$T_PORT" \
            -u "$T_USER" \
            -p"$T_PASS" \
            --ssl-mode=REQUIRED \
            "$T_DB"
          echo "Sync to Secondary complete!"
